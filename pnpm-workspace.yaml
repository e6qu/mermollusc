packages:
  - "modules/*"
  - "app/*"

# Versions are pinned here, verified against the npm registry (not from memory).
# Last verified: 2026-06-18 via `tools/pick-version.mjs` (stable, >=24h old).
# To bump: re-run the query, update here only, never hand-edit a remembered version.
catalog:
  typescript: 6.0.3
  "@biomejs/biome": 2.5.0
  vitest: 4.1.8
  "@vitest/coverage-v8": 4.1.8
  tsup: 8.5.1
  vite: 8.0.16
  "@types/node": 25.9.3
  fast-check: 4.8.0
  zod: 4.4.3
  elkjs: 0.11.1
  chevrotain: 12.0.0
  "@playwright/test": 1.60.0
  "@codemirror/state": 6.6.0
  "@codemirror/view": 6.43.1
  "@codemirror/commands": 6.10.3
  "@codemirror/language": 6.12.3
  "@codemirror/lint": 6.9.7
  "@lezer/highlight": 1.2.3

# esbuild's postinstall fetches its platform binary; vitest and tsup need it.
allowBuilds:
  esbuild: true

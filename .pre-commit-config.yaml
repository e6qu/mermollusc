# Pre-commit pipeline. Fast static checks + secret scan run at commit; SAST and e2e at push.
# Install both hook types: `make hooks` (pre-commit install --install-hooks).
minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=512"]

  # Secret scanning — fast, runs every commit (a leaked credential must never land).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: fmt-check
        name: autoformat check (biome)
        entry: make fmt-check
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: lint strict (biome + type guard)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true

      - id: typecheck
        name: typecheck strict (tsc)
        entry: make typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: unit + integration tests (vitest)
        entry: make test
        language: system
        pass_filenames: false
        always_run: true

      # SAST — slower, so it runs at push rather than every commit.
      - id: sast
        name: SAST strict (semgrep)
        entry: make sast
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: e2e-ui
        name: UI e2e — all flows (Playwright)
        entry: make e2e-ui
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: e2e-api
        name: API HTTP e2e
        entry: make e2e-api
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

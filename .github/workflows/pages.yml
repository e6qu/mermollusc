name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Pages
        run: make pages-build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

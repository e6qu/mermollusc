name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Pages
        run: make pages-build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # `actions/deploy-pages` occasionally fails with a transient "Deployment failed, try again later"
      # from the Pages API even though the build artifact is fine. With no retry, that silently strands
      # the live demo on the previous commit (it happened to #253, leaving the deployed demo a build
      # behind for hours). A fresh deployment attempt clears it, so try once more on failure — same
      # pinned action, no new dependency. The job still fails if the second attempt also fails.
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Deploy (retry transient Pages failure)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
